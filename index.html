<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- DaisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#F9FAFB] h-svh flex items-center justify-center">
    <div
      class="bg-white p-8 rounded-2xl shadow-lg flex flex-col items-center w-md"
    >
      <!-- Icon Div -->
      <div class="bg-[#4F46E5] w-fit p-4 rounded-[14px]">
        <i class="fa-solid fa-arrow-right-to-bracket text-white"></i>
      </div>

      <h2 class="text-2xl font-medium my-1">Welcome to JHK Shop</h2>

      <p class="text-gray-400">Sign in to continue shopping</p>

      <form class="w-full flex items-center flex-col mt-4 gap-4">
        <!-- Email Input Field -->
        <div class="w-full">
          <!-- Email Input -->
          <p class="font-medium mb-1.5">Email Address</p>
          <label class="input validator w-full">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </g>
            </svg>
            <input
              type="email"
              class="rounded-xl w-full"
              placeholder="mail@site.com"
              required
              id="email"
            />
          </label>
          <div class="validator-hint hidden">Enter valid email address</div>
        </div>

        <!-- Passsword Input Field -->
        <div class="w-full">
          <!-- Password Input -->
          <p class="font-medium mb-1.5">Password</p>
          <label class="input validator w-full">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <path
                  d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
                ></path>
                <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
              </g>
            </svg>
            <input
              type="password"
              id="password"
              required
              placeholder="Password"
              title="Must be more than 8 characters, including number, lowercase letter, uppercase letter"
            />
          </label>
          <p class="validator-hint hidden">
            Must be more than 8 characters, including
            <br />At least one number <br />At least one lowercase letter
            <br />At least one uppercase letter
          </p>
        </div>

        <div class="flex items-center justify-between w-full">
          <div class="flex items-center gap-2">
            <input type="checkbox" checked="checked" class="checkbox" />
            <p>Remember me</p>
          </div>

          <a href="#" class="text-[#4F46E5]">Forgot password?</a>
        </div>

        <button
          type="submit"
          class="w-full bg-[#4F46E5] text-white py-2 rounded-xl"
          id="signinBtn"
        >
          Sign In
        </button>

        <p class="text-gray-400">
          Don't have an account?
          <a href="#" class="text-[#4F46E5]">Contact us</a>
        </p>
      </form>
    </div>

    <script src="./script/index.js"></script>
  </body>
</html>
